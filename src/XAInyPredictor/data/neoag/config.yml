name: "Neoantigen Candidate Prioritizer"
description: "Prioritize peptide-HLA neoantigen candidates by predicted immunogenicity"
use_case_type: "neoantigen"
false_negative_rate: 0.10
max_reference_candidates: 40
default_selected_features: 5
max_curve_features: 6
target_column: "Qualitative_Measure"
positive_class: 1
negative_class: 0

model_metadata:
  model_version: "KAN symbolic prototype"
  training_date: "Neoantigen dataset snapshot"
  cohort_source: "Reference peptide-HLA candidate dataset from the neoantigen model development workflow"
  intended_use: "Interpretable stratification support for neoantigen candidate prioritization and exploratory translational research"
  validation_status: "Clinical utility and workflow fit should be validated with immunology and oncology collaborators"
  limitations: "Candidate-level prototype; patient-level stratification requires patient identifiers, patient-specific candidate sets, and clinical validation."

features:
  - name: "Peptide"
    label: "Peptide sequence"
    type: "text"
    role: "identifier"
    plot: false
    default: "YMDGTMSQV"
    description: "Mutated peptide sequence presented by the HLA molecule."

  - name: "hla"
    label: "HLA allele"
    type: "text"
    default: "HLA-B35:01"
    description: "Presenting HLA allele."

  - name: "pseudosequence"
    label: "HLA pseudosequence"
    type: "text"
    default: "YYATYRNIFTNTYESNLYIRYDSYTWAVLAYLWY"
    description: "HLA binding-groove pseudosequence."

  - name: "Molecular_weight"
    label: "Molecular weight"
    type: "numeric"
    min: 500
    max: 2500
    default: 1065.28
    step: 0.01

  - name: "GRAVY"
    label: "GRAVY"
    type: "numeric"
    min: -5
    max: 5
    default: 0.29
    step: 0.01

  - name: "instability"
    label: "Instability index"
    type: "numeric"
    min: 0
    max: 200
    default: 55.97
    step: 0.01

  - name: "mhcflurry_affinity_percentile"
    label: "MHCflurry affinity percentile"
    type: "numeric"
    min: 0
    max: 100
    default: 0.036
    step: 0.001

  - name: "pI"
    label: "Isoelectric point"
    type: "numeric"
    min: 0
    max: 14
    default: 5.84
    step: 0.01

  - name: "mhcflurry_processing_score"
    label: "MHCflurry processing score"
    type: "numeric"
    min: 0
    max: 1
    default: 0.758
    step: 0.001

  - name: "mhcflurry_presentation_score"
    label: "MHCflurry presentation score"
    type: "numeric"
    min: 0
    max: 1
    default: 0.974
    step: 0.001

  - name: "Half_life"
    label: "Half-life"
    type: "numeric"
    min: 0
    max: 100
    default: 5.5
    step: 0.1

  - name: "charge"
    label: "Charge"
    type: "numeric"
    min: -5
    max: 5
    default: 0
    step: 1

  - name: "score"
    label: "Expression score"
    type: "numeric"
    min: -5
    max: 5
    default: -0.0026
    step: 0.0001

  - name: "hydro_P2"
    label: "Hydrophobicity P2"
    type: "numeric"
    min: -5
    max: 5
    default: 2.8
    step: 0.1

  - name: "hydro_P9"
    label: "Hydrophobicity P9"
    type: "numeric"
    min: -5
    max: 5
    default: 1.9
    step: 0.1

encoding: {}

