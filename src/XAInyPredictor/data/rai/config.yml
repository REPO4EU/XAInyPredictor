help_texts:
  fnr_threshold: "This setting controls how many positive patients the model is allowed to miss when assigning patient groups."
  fnr_zero: "We refuse to miss any true RAI-Refractory patients. The model will classify a patient as Refractory even if the probability is low (High Sensitivity)."
  fnr_higher: "We accept missing some Refractory patients to ensure those we treat are definitely Refractory (High Specificity)."
  reference_population_input: "It will show the distribution of the input data."
  reference_population_model: "It will show the distribution of the model data."
  radar_plot: "The radar plot compares the values of the features from a selected patient with three different distributions."
  radar_average_all: "The average values from all patients in the model."
  radar_average_negative: "The average values from all RAI-R negative patients in the model (green)."
  radar_average_positive: "The average values from all RAI-R positive patients in the model (red)."
  curves_plot: "The curves plot displays the distribution of values from a specific feature across the patients in the model, ordered from lowest to highest."
