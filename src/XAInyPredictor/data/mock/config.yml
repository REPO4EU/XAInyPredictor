name: "Diabetes Risk Predictor"
description: "Predict risk of Type 2 Diabetes development based on clinical parameters"
model_metadata:
  model_version: "Demo prototype"
  training_date: "Synthetic demonstration dataset"
  cohort_source: "Mock reference cohort for workflow demonstration"
  intended_use: "Demonstrate the patient stratification workflow on a simple risk use case"
  validation_status: "Clinical usefulness should be validated with domain experts before real-world deployment"
  limitations: "Demo use case with synthetic/example data; not intended to represent a validated diabetes model"

target_column: "Diabetes-Risk"
positive_class: "High"
negative_class: "Low"
features:
  - name: "Age"
    type: "numeric"
    display_name: "Age (years)"
    input_type: "numeric"
    min: 18
    max: 100
    default: 45
  - name: "BMI"
    type: "numeric"
    display_name: "BMI (kg/m2)"
    input_type: "numeric"
    min: 15
    max: 60
    default: 25
  - name: "Blood Pressure"
    type: "numeric"
    display_name: "Systolic BP (mmHg)"
    input_type: "numeric"
    min: 80
    max: 200
    step: 1
    default: 120
  - name: "Glucose"
    type: "numeric"
    display_name: "Fasting Glucose (mg/dL)"
    input_type: "numeric"
    min: 50
    max: 300
    default: 100
  - name: "Family History"
    type: "categorical"
    display_name: "Family History"
    input_type: "select"
    values:
      - "YES"
      - "NO"
    default: "NO"
  - name: "Smoking Status"
    type: "categorical"
    display_name: "Smoking Status"
    input_type: "select"
    values:
      - Current
      - Former
      - Never
    default: "Never"
  - name: "Physical Activity"
    type: "categorical"
    display_name: "Physical Activity Level"
    input_type: "select"
    values:
      - Sedentary
      - Moderate
      - Active
    default: "Moderate"
  - name: "Diet Quality"
    type: "categorical"
    display_name: "Diet Quality"
    input_type: "select"
    values:
      - Poor
      - Average
      - Good
    default: "Average"

encoding:
  Family History:
    "NO": 0
    "YES": 1
  Smoking Status:
    Never: 0
    Former: 1
    Current: 2
  Physical Activity:
    Sedentary: 0
    Moderate: 1
    Active: 2
  Diet Quality:
    Poor: 0
    Average: 1
    Good: 2

labels:
  positive_class_label: "High Risk"
  negative_class_label: "Low Risk"
  probability_column: "Stratification Score"
  class_column: "Patient Group"
  form:
    add_patient_button: "Add Patient to Cohort"
    delete_selected_button: "Delete Selected"
    cohort_title: "Current Patient Cohort"
titles:
  app_title: "XAInyPredictor"
  tab_data_input: "1. Data Input"
  tab_data_exploration: "2. Cohort Context"
  tab_prediction: "3. Patient Stratification"
  data_source: "Data Source"
  select_method: "Select Method:"
  manual_entry: "Manual Entry"
  upload_file: "Upload File"
  example_cohort: "Example Cohort"
  feature_analysis: "Patient Profile Comparison"
  feature_analysis_short: "Profile Comparison"
  distance_analysis: "Feature Context Curves"
  distance_analysis_short: "Feature Curves"
  prediction_results: "Stratification Results"
help_texts:
  fnr_threshold: "Adjust how many high-risk patients the model is allowed to miss when assigning patient groups."
  fnr_zero: "Classify all high-risk patients regardless of probability (high sensitivity)."
  fnr_higher: "Focus on high-confidence predictions (high specificity)."
  reference_population_input: "Show distribution of your patient data."
  reference_population_model: "Show distribution of the model training data."
  radar_plot: "Compare patient features against population averages."
  radar_average_all: "Average of all patients in the model."
  radar_average_negative: "Average of low-risk patients (green)."
  radar_average_positive: "Average of high-risk patients (red)."
  curves_plot: "Show how each feature value relates to risk."
